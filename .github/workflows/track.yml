name: Build and deploy

# Data polling now happens outside GitHub Actions, on a machine running
# scripts/poll_cron.sh every 5 minutes (see README.md "Running the poller
# yourself") — GitHub Actions was throttling the schedule trigger to run
# every 1-3 hours instead of the configured */5, which was too infrequent.
# This workflow just builds and deploys whenever that poller pushes data.
on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "content/**"
      - "layouts/**"
      - "static/**"
      - "hugo.toml"
      - "archetypes/**"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.132.0"

      - name: Build site
        run: hugo --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
